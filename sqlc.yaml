version: '2'
sql:
  - engine: "postgresql"
    schema: "./db/migrations"
    queries: "./db/queries"
    gen:
      go:
        package: "db"
        out: "./db/sqlc"
        emit_empty_slices: true
        emit_json_tags: true
        # THIS LINE IS THE KEY
        overrides:
          - db_type: "int4"
            go_type: "int32"
          - db_type: "bigint"
            go_type: "int64"
          - db_type: "numeric"
            go_type: "float64"
          - db_type: "decimal"
            go_type: "float64"