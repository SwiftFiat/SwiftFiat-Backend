host: localhost:8080
info:
  contact:
    email: support@swiftfiat.com
    name: API Support
    url: http://www.swiftfiat.com/support
  description: SwiftFiat Backend API for cryptocurrency and fiat transactions
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: SwiftFiat API
  version: "1.0"
paths:
  /api/admin/v1/wallets/add-to-wallet-balance:
    post:
      consumes:
      - application/json
      description: Adds a specified amount to a user's wallet balance. This endpoint
        is intended for administrative use only.
      parameters:
      - description: Request Body
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.WalletResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add to Wallet Balance (Admin Only)
      tags:
      - Wallets
  /api/admin/v1/wallets/transaction-fee:
    post:
      consumes:
      - application/json
      description: Creates or updates the fee structure for a specific transaction
        type.
      parameters:
      - description: Transaction Fee Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/transaction.CreateTransactionFeeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TransactionFeeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Transaction Fee
      tags:
      - Wallets
  /api/v1/analytics/active-users-today:
    get:
      consumes:
      - application/json
      description: Retrieve the count of active users for a specific date. Accessible
        only by admin, super admin, or customer rep.
      parameters:
      - default: today's date
        description: Date in YYYY-MM-DD format
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Active Users Count
      tags:
      - Analytics
  /api/v1/analytics/activity-log/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve activity logs for a specific user by their ID. Accessible
        only by admin, super admin, or customer rep.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - default: 50
        description: Limit number of logs
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/activitylogs.AuditLogResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Activity Logs for a User
      tags:
      - Analytics
  /api/v1/analytics/activity-logs:
    delete:
      consumes:
      - application/json
      description: Delete activity logs older than a certain threshold. Accessible
        only by admin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete Old Activity Logs
      tags:
      - Analytics
    get:
      consumes:
      - application/json
      description: Retrieve recent activity logs. Accessible only by admin, super
        admin, or customer rep.
      parameters:
      - default: 50
        description: Limit number of logs
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/activitylogs.AuditLogResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Recent Activity Logs
      tags:
      - Analytics
  /api/v1/analytics/crypto-transactions:
    get:
      consumes:
      - application/json
      description: Retrieve all crypto transactions. Accessible only by admin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
