          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete Old Activity Logs
      tags:
      - Analytics
    get:
      consumes:
      - application/json
      description: Retrieve recent activity logs. Accessible only by admin, super
        admin, or customer rep.
      parameters:
      - default: 50
        description: Limit number of logs
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/models.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/db.AuditLog'
                  type: array
              type: object
        "400":
